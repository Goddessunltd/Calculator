<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="manifest" href="manifest.json"/>
  <meta name="theme-color" content="#1c1c1a"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="Bliss Calc"/>
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png"/>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
  <title>Daily Appointment Totaler</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&family=Jost:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --surface:    #1c1c1a;
      --border:     #2e2e2b;
      --gold:       #c9a96e;
      --gold-light: #e0c898;
      --gold-dim:   #7a6340;
      --text:       #e8e4dc;
      --muted:      #7a7771;
      --pill-bg:    #252522;
      --danger:     #c97070;
      --danger-dim: #3a2020;
      --radius:     6px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { -webkit-text-size-adjust: 100%; }

    body {
      background: transparent;
      font-family: 'Jost', sans-serif;
      font-weight: 300;
      color: var(--text);
      padding: 16px 12px 48px;
    }

    .app {
      width: 100%;
      max-width: 500px;
      margin: 0 auto;
      display: block;
    }

    /* ── SHARED BLOCK ── */
    .block {
      display: block;
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      margin-bottom: 10px;
      overflow: hidden;
    }

    /* ── BLOCK 1: TITLE ── */
    .title-block {
      padding: 28px 20px 24px;
      text-align: center;
    }
    .title-eyebrow {
      font-size: 9px;
      letter-spacing: 0.32em;
      text-transform: uppercase;
      color: var(--gold-dim);
      margin-bottom: 10px;
    }
    .title-main {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(26px, 7.5vw, 40px);
      font-weight: 400;
      color: var(--gold-light);
      letter-spacing: 0.04em;
      line-height: 1.1;
    }
    .title-line {
      width: 36px; height: 1px;
      background: var(--gold-dim);
      margin: 14px auto 0;
    }

    /* ── BLOCK INNER PADDING ── */
    .block-inner { padding: 20px 18px; }

    .block-label {
      font-size: 9px;
      letter-spacing: 0.32em;
      text-transform: uppercase;
      color: var(--gold-dim);
      margin-bottom: 12px;
      display: block;
    }

    /* ── SELECT ── */
    .select-wrapper { position: relative; }
    .select-wrapper::after {
      content: '\25BE';
      position: absolute;
      right: 12px; top: 50%;
      transform: translateY(-50%);
      color: var(--gold-dim);
      font-size: 11px;
      pointer-events: none;
    }
    select {
      width: 100%;
      -webkit-appearance: none;
      appearance: none;
      background: var(--pill-bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-family: 'Jost', sans-serif;
      font-size: 16px;
      font-weight: 300;
      padding: 13px 36px 13px 12px;
      cursor: pointer;
      transition: border-color 0.2s;
    }
    select:focus { outline: none; border-color: var(--gold-dim); }
    select option { background: #1c1c1a; color: var(--text); }

    /* ── ENHANCEMENTS ── */
    .enhancements-grid { display: flex; flex-direction: column; gap: 8px; margin-top: 4px; }

    .enhancement-item {
      display: flex; align-items: center; gap: 10px;
      padding: 13px 12px;
      background: var(--pill-bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
      min-height: 48px;
    }
    .enhancement-item:active { border-color: var(--gold-dim); }
    .enhancement-item.selected { border-color: var(--gold); background: #221e15; }
    .enhancement-item input[type="checkbox"] { display: none; }

    .check-box {
      width: 18px; height: 18px;
      border: 1px solid var(--gold-dim);
      border-radius: 2px; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.15s;
    }
    .enhancement-item.selected .check-box { background: var(--gold); border-color: var(--gold); }
    .check-box::after {
      content: '';
      width: 5px; height: 8px;
      border-right: 2px solid #111;
      border-bottom: 2px solid #111;
      transform: rotate(45deg) translate(-1px, -1px);
      opacity: 0; transition: opacity 0.1s;
    }
    .enhancement-item.selected .check-box::after { opacity: 1; }
    .enhancement-name { flex: 1; font-size: 14px; color: var(--text); line-height: 1.3; }
    .enhancement-price { font-size: 13px; color: var(--gold-dim); white-space: nowrap; }

    /* ── ADD BUTTON ── */
    .btn-add {
      display: block; width: 100%;
      padding: 18px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--gold);
      font-family: 'Jost', sans-serif;
      font-size: 11px; font-weight: 500;
      letter-spacing: 0.3em; text-transform: uppercase;
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s, color 0.2s;
      min-height: 56px;
      -webkit-tap-highlight-color: transparent;
      margin-bottom: 10px;
    }
    .btn-add:active:not(:disabled),
    .btn-add:hover:not(:disabled) {
      background: var(--gold); border-color: var(--gold); color: #111;
    }
    .btn-add:disabled { opacity: 0.35; cursor: not-allowed; }

    /* ── APPOINTMENT LIST ── */
    .appt-list-block { padding: 20px 18px; }
    .appt-count {
      font-size: 9px; letter-spacing: 0.32em;
      text-transform: uppercase; color: var(--gold-dim);
      margin-bottom: 12px; display: block;
    }

    .appt-item {
      display: flex; align-items: flex-start;
      gap: 10px;
      padding: 14px 12px;
      background: var(--pill-bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      margin-bottom: 8px;
      animation: fadeIn 0.2s ease;
    }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }

    .appt-number {
      font-family: 'Cormorant Garamond', serif;
      font-size: 18px; color: var(--gold-dim);
      flex-shrink: 0; line-height: 1.2;
      min-width: 22px;
    }
    .appt-details { flex: 1; min-width: 0; }
    .appt-service {
      font-size: 13px; color: var(--text);
      font-weight: 400; margin-bottom: 2px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .appt-enhancements {
      font-size: 11px; color: var(--muted);
      line-height: 1.4; word-break: break-word;
    }
    .appt-total {
      font-family: 'Cormorant Garamond', serif;
      font-size: 20px; color: var(--gold-light);
      flex-shrink: 0; text-align: right; line-height: 1.2;
    }
    .btn-remove {
      background: none; border: none;
      color: var(--danger); font-size: 16px;
      cursor: pointer; padding: 0 0 0 6px;
      flex-shrink: 0; line-height: 1;
      -webkit-tap-highlight-color: transparent;
      opacity: 0.6; transition: opacity 0.15s;
    }
    .btn-remove:hover { opacity: 1; }

    /* ── TOTALS BUTTON ── */
    .btn-total {
      display: block; width: 100%;
      padding: 18px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--gold);
      font-family: 'Jost', sans-serif;
      font-size: 11px; font-weight: 500;
      letter-spacing: 0.3em; text-transform: uppercase;
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s, color 0.2s;
      min-height: 56px;
      -webkit-tap-highlight-color: transparent;
      margin-bottom: 10px;
    }
    .btn-total:active:not(:disabled),
    .btn-total:hover:not(:disabled) {
      background: var(--gold); border-color: var(--gold); color: #111;
    }
    .btn-total:disabled { opacity: 0.35; cursor: not-allowed; }

    /* ── RESULTS ── */
    .results {
      opacity: 0; transform: translateY(8px);
      transition: opacity 0.3s ease, transform 0.3s ease;
      pointer-events: none;
    }
    .results.visible { opacity: 1; transform: translateY(0); pointer-events: auto; }

    .result-total {
      background: var(--surface);
      border: 1px solid var(--gold-dim);
      border-radius: var(--radius);
      text-align: center;
      padding: 24px 20px 20px;
      margin-bottom: 10px;
    }
    .result-total-label {
      font-size: 9px; letter-spacing: 0.35em;
      text-transform: uppercase; color: var(--muted); margin-bottom: 6px;
    }
    .result-total-amount {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(40px, 12vw, 56px);
      font-weight: 300; color: var(--gold-light);
      letter-spacing: 0.02em; line-height: 1;
    }
    .result-appt-count {
      font-size: 11px; color: var(--muted);
      margin-top: 8px; letter-spacing: 0.04em;
    }

    .breakdown-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .breakdown-item {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 12px;
    }
    .breakdown-item.full-width { grid-column: 1 / -1; }
    .breakdown-role {
      font-size: 8.5px; letter-spacing: 0.28em;
      text-transform: uppercase;
      color: #ffffff; font-weight: 500;
      margin-bottom: 5px;
    }
    .breakdown-amount {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(22px, 6vw, 30px);
      font-weight: 400; color: var(--text);
    }
    .breakdown-item.envelope .breakdown-amount { color: var(--gold); }

    /* ── RESET ── */
    .btn-reset {
      display: block; width: 100%;
      padding: 14px;
      background: transparent;
      border: 1px solid var(--danger-dim);
      border-radius: var(--radius);
      color: var(--danger);
      font-family: 'Jost', sans-serif;
      font-size: 10px; font-weight: 400;
      letter-spacing: 0.28em; text-transform: uppercase;
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s;
      margin-top: 10px;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-reset:hover { background: var(--danger-dim); border-color: var(--danger); }

    /* ── STATES ── */
    .loading-state {
      text-align: center; padding: 16px;
      color: var(--muted); font-size: 13px; letter-spacing: 0.08em;
    }
    .error-state {
      padding: 14px; color: var(--danger); font-size: 12px;
      line-height: 1.6; text-align: center;
      border: 1px solid var(--danger-dim);
      border-radius: var(--radius); background: #1e1515;
    }
    .empty-state {
      text-align: center; padding: 20px 12px;
      color: var(--muted); font-size: 12px;
      letter-spacing: 0.06em; line-height: 1.6;
    }
  </style>
</head>
<body>
<div class="app">

  <!-- BLOCK 1: Title -->
  <div class="block title-block">
    <div class="title-eyebrow">Provider</div>
    <div class="title-main">Daily Totaler</div>
    <div class="title-line"></div>
  </div>

  <!-- BLOCK 2: Service Selector -->
  <div class="block block-inner">
    <span class="block-label">Select a Service</span>
    <div id="service-container">
      <div class="loading-state">Loading services&#8230;</div>
    </div>
  </div>

  <!-- BLOCK 3: Enhancements -->
  <div class="block block-inner" id="enhancements-card" style="display:none;">
    <span class="block-label">Add Enhancements</span>
    <div id="enhancements-container"></div>
  </div>

  <!-- Add Appointment Button -->
  <button class="btn-add" id="btn-add" disabled onclick="addAppointment()">+ Add Appointment</button>

  <!-- BLOCK 4: Appointment List -->
  <div class="block appt-list-block" id="list-block" style="display:none;">
    <span class="block-label" id="appt-count">0 Appointments</span>
    <div id="appt-list"></div>
  </div>

  <!-- Calculate Day Total Button -->
  <button class="btn-total" id="btn-total" disabled onclick="calcTotal()">Calculate Day Total</button>

  <!-- Results -->
  <div class="results" id="results">
    <div class="result-total">
      <div class="result-total-label">Day Total</div>
      <div class="result-total-amount" id="res-total">$0</div>
      <div class="result-appt-count" id="res-count"></div>
    </div>
    <div class="breakdown-grid">
      <div class="breakdown-item">
        <div class="breakdown-role">Provider</div>
        <div class="breakdown-amount" id="res-provider">$0</div>
      </div>
      <div class="breakdown-item">
        <div class="breakdown-role">House</div>
        <div class="breakdown-amount" id="res-house">$0</div>
      </div>
      <div class="breakdown-item">
        <div class="breakdown-role">Booker</div>
        <div class="breakdown-amount" id="res-booker">$0</div>
      </div>
      <div class="breakdown-item envelope full-width">
        <div class="breakdown-role">Envelope Total</div>
        <div class="breakdown-amount" id="res-envelope">$0</div>
      </div>
    </div>
    <button class="btn-reset" onclick="resetDay()">&#8635; Reset &amp; Start New Day</button>
  </div>

</div>
<script>
var SERVICES_URL     = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQ6dMzEqV3TJsy2TWmdEd-YQ8z2lV31CgAfZnCbID7Mpl-15IBZI5qnPhQr3tug-d8BKWx-lhJDCuD4/pub?gid=0&single=true&output=csv';
var ENHANCEMENTS_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQ6dMzEqV3TJsy2TWmdEd-YQ8z2lV31CgAfZnCbID7Mpl-15IBZI5qnPhQr3tug-d8BKWx-lhJDCuD4/pub?gid=891352209&single=true&output=csv';
var PROXY            = 'https://corsproxy.io/?';

var servicesData     = [];
var enhancementsData = [];
var appointments     = []; // running list of added appointments

// ── Fetch ──────────────────────────────────────────────────────
function fetchCSV(url) {
  return fetch(url)
    .then(function(r) {
      if (!r.ok) throw new Error('status ' + r.status);
      return r.text();
    })
    .catch(function() {
      return fetch(PROXY + encodeURIComponent(url))
        .then(function(r) {
          if (!r.ok) throw new Error('proxy ' + r.status);
          return r.text();
        });
    });
}

// ── CSV Parser ─────────────────────────────────────────────────
function splitLine(line) {
  var cols = [], cur = '', inQ = false;
  for (var i = 0; i < line.length; i++) {
    var c = line[i];
    if (c === '"') { inQ = !inQ; }
    else if (c === ',' && !inQ) { cols.push(cur.trim()); cur = ''; }
    else { cur += c; }
  }
  cols.push(cur.trim());
  return cols;
}

function parseCSV(text, isEnh) {
  var lines = text.replace(/\r/g, '').trim().split('\n').filter(function(l) { return l.trim(); });
  var rows = [];
  for (var i = 1; i < lines.length; i++) {
    var c = splitLine(lines[i]);
    var row = {
      name:     (c[0] || '').replace(/^"|"$/g, ''),
      total:    parseFloat(c[1]) || 0,
      provider: parseFloat(c[2]) || 0,
      house:    parseFloat(c[3]) || 0,
      booker:   parseFloat(c[4]) || 0,
      envelope: parseFloat(c[5]) || 0,
      services: []
    };
    if (isEnh) {
      var raw = (c[6] || '').replace(/^"|"$/g, '').trim();
      row.services = raw ? raw.split(',').map(function(s) { return s.trim().toLowerCase(); }) : [];
    }
    if (row.name) rows.push(row);
  }
  return rows;
}

var dollar = function(n) {
  return '$' + Number(n).toLocaleString('en-US', { minimumFractionDigits: 0 });
};

// ── Render Services ────────────────────────────────────────────
function renderServices() {
  var c = document.getElementById('service-container');
  if (!servicesData.length) {
    c.innerHTML = '<div class="error-state">No services found.</div>'; return;
  }
  var opts = '<option value="">&#8212; Choose a service &#8212;</option>';
  for (var i = 0; i < servicesData.length; i++) {
    opts += '<option value="' + i + '">' + servicesData[i].name + ' \u2014 ' + dollar(servicesData[i].total) + '</option>';
  }
  c.innerHTML = '<div class="select-wrapper"><select id="svc" onchange="onServiceChange()">' + opts + '</select></div>';
}

// ── Service Change → filter enhancements ──────────────────────
function onServiceChange() {
  var val = document.getElementById('svc').value;
  document.getElementById('btn-add').disabled = (val === '');

  if (val === '') {
    document.getElementById('enhancements-card').style.display = 'none';
    return;
  }

  var name = servicesData[parseInt(val)].name.toLowerCase();
  var applicable = [];
  for (var i = 0; i < enhancementsData.length; i++) {
    var e = enhancementsData[i];
    if (e.services.length === 0 || e.services.indexOf(name) !== -1) {
      applicable.push({ data: e, idx: i });
    }
  }

  var card = document.getElementById('enhancements-card');
  var cont = document.getElementById('enhancements-container');

  if (!applicable.length) { card.style.display = 'none'; return; }

  var html = '<div class="enhancements-grid">';
  for (var j = 0; j < applicable.length; j++) {
    var a = applicable[j];
    html += '<label class="enhancement-item" id="ei' + a.idx + '" onclick="toggleEnh(' + a.idx + ')">'
          + '<input type="checkbox" id="ec' + a.idx + '" />'
          + '<div class="check-box"></div>'
          + '<span class="enhancement-name">' + a.data.name + '</span>'
          + '<span class="enhancement-price">+' + dollar(a.data.total) + '</span>'
          + '</label>';
  }
  html += '</div>';
  cont.innerHTML = html;
  card.style.display = 'block';
}

function toggleEnh(i) {
  var cb   = document.getElementById('ec' + i);
  var item = document.getElementById('ei' + i);
  cb.checked = !cb.checked;
  item.classList.toggle('selected', cb.checked);
}

// ── Add Appointment ────────────────────────────────────────────
function addAppointment() {
  var val = document.getElementById('svc').value;
  if (val === '') return;

  var svc = servicesData[parseInt(val)];
  var enhs = [];

  for (var i = 0; i < enhancementsData.length; i++) {
    var cb = document.getElementById('ec' + i);
    if (cb && cb.checked) enhs.push(enhancementsData[i]);
  }

  // Build appointment totals
  var appt = {
    service:      svc,
    enhancements: enhs,
    total:    svc.total,
    provider: svc.provider,
    house:    svc.house,
    booker:   svc.booker,
    envelope: svc.envelope
  };
  for (var j = 0; j < enhs.length; j++) {
    appt.total    += enhs[j].total;
    appt.provider += enhs[j].provider;
    appt.house    += enhs[j].house;
    appt.booker   += enhs[j].booker;
    appt.envelope += enhs[j].envelope;
  }

  appointments.push(appt);
  renderList();

  // Reset selectors for next appointment
  document.getElementById('svc').value = '';
  document.getElementById('btn-add').disabled = true;
  document.getElementById('enhancements-card').style.display = 'none';
  document.getElementById('results').classList.remove('visible');
}

// ── Render Appointment List ────────────────────────────────────
function renderList() {
  var listBlock = document.getElementById('list-block');
  var list      = document.getElementById('appt-list');
  var countEl   = document.getElementById('appt-count');
  var n         = appointments.length;

  document.getElementById('btn-total').disabled = (n === 0);

  if (n === 0) {
    listBlock.style.display = 'none';
    return;
  }

  listBlock.style.display = 'block';
  countEl.textContent = n + (n === 1 ? ' Appointment' : ' Appointments');

  var html = '';
  for (var i = 0; i < n; i++) {
    var a    = appointments[i];
    var enhs = a.enhancements.map(function(e) { return e.name; }).join(', ');
    html += '<div class="appt-item">'
          + '<div class="appt-number">' + (i + 1) + '</div>'
          + '<div class="appt-details">'
          + '<div class="appt-service">' + a.service.name + '</div>'
          + (enhs ? '<div class="appt-enhancements">+ ' + enhs + '</div>' : '')
          + '</div>'
          + '<div class="appt-total">' + dollar(a.total) + '</div>'
          + '<button class="btn-remove" onclick="removeAppointment(' + i + ')" title="Remove">&#x2715;</button>'
          + '</div>';
  }
  list.innerHTML = html;
}

// ── Remove Appointment ─────────────────────────────────────────
function removeAppointment(i) {
  appointments.splice(i, 1);
  renderList();
  document.getElementById('results').classList.remove('visible');
}

// ── Calculate Day Total ────────────────────────────────────────
function calcTotal() {
  if (!appointments.length) return;

  var total = 0, provider = 0, house = 0, booker = 0, envelope = 0;
  for (var i = 0; i < appointments.length; i++) {
    var a = appointments[i];
    total    += a.total;
    provider += a.provider;
    house    += a.house;
    booker   += a.booker;
    envelope += a.envelope;
  }

  var n = appointments.length;
  document.getElementById('res-total').textContent    = dollar(total);
  document.getElementById('res-provider').textContent = dollar(provider);
  document.getElementById('res-house').textContent    = dollar(house);
  document.getElementById('res-booker').textContent   = dollar(booker);
  document.getElementById('res-envelope').textContent = dollar(envelope);
  document.getElementById('res-count').textContent    = n + (n === 1 ? ' appointment' : ' appointments');

  document.getElementById('results').classList.add('visible');
  document.getElementById('results').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

// ── Reset ──────────────────────────────────────────────────────
function resetDay() {
  appointments = [];
  renderList();
  document.getElementById('svc').value = '';
  document.getElementById('btn-add').disabled = true;
  document.getElementById('enhancements-card').style.display = 'none';
  document.getElementById('results').classList.remove('visible');
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ── Init ───────────────────────────────────────────────────────
Promise.all([fetchCSV(SERVICES_URL), fetchCSV(ENHANCEMENTS_URL)])
  .then(function(results) {
    servicesData     = parseCSV(results[0], false);
